<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="HABIT — Entrar" />
  <title>HABIT — Entrar</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Ir para o conteúdo principal</a>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <a class="site-logo" href="index.html" aria-label="HABIT — Página inicial">HABIT</a>
      <button class="nav-toggle" aria-controls="site-nav" aria-expanded="false" aria-label="Abrir menu">&#9776;</button>
      <nav class="site-nav" id="site-nav" role="navigation" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="listagem.html">Páginas</a>
        <a href="destaques.html">Destaques</a>
        <a href="assinar.html">Assinar</a>
        <a href="admin-categorias.html" class="nav-admin">Admin</a>
      </nav>
      <div class="header-search" role="search">
        <label for="search-input" class="sr-only">Buscar</label>
        <input type="search" id="search-input" name="q" placeholder="Buscar..." />
        <a href="busca.html" class="btn btn-outline btn-sm">Buscar</a>
        <a href="entrar.html" class="btn btn-outline-neutral btn-sm" aria-current="page">Entrar</a>
      </div>
    </div>
  </header>

  <main id="main" tabindex="-1">
    <div class="page-wrapper" style="min-height: 60vh;">
      <div class="container">
        <div class="form-page">
          <div class="form-card">
            <h1>Entrar</h1>

            <div class="form-group">
              <label for="login-email">E-mail</label>
              <input
                class="form-input"
                type="email"
                id="login-email"
                name="email"
                placeholder="E-mail"
                autocomplete="email"
                required
              />
            </div>

            <div class="form-group">
              <label for="login-senha">Senha</label>
              <input
                class="form-input"
                type="password"
                id="login-senha"
                name="senha"
                placeholder="Senha"
                autocomplete="current-password"
                required
              />
            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-primary">Entrar</button>
              <button type="button" class="btn btn-outline">Entrar com Google</button>
            </div>

            <p class="form-links">
              <a href="#">Esqueci a senha</a> •
              <a href="criar-conta.html">Criar conta</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <nav class="footer-links" aria-label="Links do rodapé">
        <a href="#">Instagram</a><a href="#">Work</a><a href="#">Bags</a><a href="#">Lamp</a><a href="#">Books</a>
      </nav>
      <p class="footer-copy">© 2025 Meu Site • <a href="#">Meu site</a></p>
    </div>
  </footer>

  <script>
    const btn = document.querySelector('.nav-toggle');
    const nav = document.getElementById('site-nav');
    btn.addEventListener('click', () => { const o = nav.classList.toggle('open'); btn.setAttribute('aria-expanded', o); });
  </script>
</body>
</html>
