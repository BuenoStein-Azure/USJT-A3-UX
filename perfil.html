<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="HABIT — Meu Perfil" />
  <title>HABIT — Perfil</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Ir para o conteúdo principal</a>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <a class="site-logo" href="index.html" aria-label="HABIT — Página inicial">HABIT</a>
      <button class="nav-toggle" aria-controls="site-nav" aria-expanded="false" aria-label="Abrir menu">&#9776;</button>
      <nav class="site-nav" id="site-nav" role="navigation" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="listagem.html">Páginas</a>
        <a href="destaques.html">Destaques</a>
        <a href="assinar.html">Assinar</a>
        <a href="admin-categorias.html" class="nav-admin">Admin</a>
      </nav>
      <div class="header-search" role="search">
        <label for="search-input" class="sr-only">Buscar</label>
        <input type="search" id="search-input" name="q" placeholder="Buscar..." />
        <a href="busca.html" class="btn btn-outline btn-sm">Buscar</a>
        <a href="entrar.html" class="btn btn-outline-neutral btn-sm">Entrar</a>
      </div>
    </div>
  </header>

  <main id="main" tabindex="-1">
    <div class="page-wrapper">
      <div class="container">
        <div class="content-card">
          <div class="profile-layout">

            <!-- Sidebar de perfil -->
            <aside class="profile-sidebar" aria-label="Dados do perfil">
              <h2>Perfil</h2>

              <div class="profile-avatar">
                <span class="img-placeholder" style="height:120px;" role="img" aria-label="Foto de perfil"></span>
              </div>

              <div class="form-group">
                <label for="perfil-nome">Nome</label>
                <input class="form-input" type="text" id="perfil-nome" name="nome" placeholder="Nome" />
              </div>

              <div class="form-group">
                <label for="perfil-bio">Bio</label>
                <input class="form-input" type="text" id="perfil-bio" name="bio" placeholder="Bio" />
              </div>

              <button type="button" class="btn btn-primary">Salvar</button>
            </aside>

            <!-- Postagens do usuário -->
            <section aria-labelledby="posts-heading">
              <h2 id="posts-heading" style="font-size: var(--text-xl); font-weight: 800; margin-bottom: var(--space-md);">
                Suas Postagens
              </h2>

              <ul style="list-style: none; padding: 0;">
                <li>
                  <article class="post-item">
                    <span class="img-placeholder" role="img" aria-label="Imagem do Post 1"></span>
                    <div>
                      <p class="post-item-status">Rascunho</p>
                      <h3 class="post-item-title">Post 1</h3>
                    </div>
                  </article>
                </li>
                <li>
                  <article class="post-item">
                    <span class="img-placeholder" role="img" aria-label="Imagem do Post 2"></span>
                    <div>
                      <p class="post-item-status">Publicado</p>
                      <h3 class="post-item-title">Post 2</h3>
                    </div>
                  </article>
                </li>
                <li>
                  <article class="post-item">
                    <span class="img-placeholder" role="img" aria-label="Imagem do Comentário 1"></span>
                    <div>
                      <p class="post-item-status">Em análise</p>
                      <h3 class="post-item-title">Comentário 1</h3>
                    </div>
                  </article>
                </li>
                <li>
                  <article class="post-item">
                    <span class="img-placeholder" role="img" aria-label="Imagem do Comentário 2"></span>
                    <div>
                      <p class="post-item-status">Publicado</p>
                      <h3 class="post-item-title">Comentário 2</h3>
                    </div>
                  </article>
                </li>
              </ul>
            </section>

          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <nav class="footer-links" aria-label="Links do rodapé">
        <a href="#">Instagram</a><a href="#">Work</a><a href="#">Bags</a><a href="#">Lamp</a><a href="#">Books</a>
      </nav>
      <p class="footer-copy">© 2025 Meu Site • <a href="#">Meu site</a></p>
    </div>
  </footer>

  <script>
    const btn = document.querySelector('.nav-toggle');
    const nav = document.getElementById('site-nav');
    btn.addEventListener('click', () => { const o = nav.classList.toggle('open'); btn.setAttribute('aria-expanded', o); });
  </script>
</body>
</html>
